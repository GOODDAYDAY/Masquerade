# Masquerade Application Configuration
# Sensitive values (API keys) should go in .env, not here.
# Override with env vars prefixed MASQUERADE_ (e.g. MASQUERADE_LOG_LEVEL=DEBUG)

log_level: "INFO"
log_dir: "logs"

scripts_dir: "output/scripts"
output_dir: "output"

# Concurrency control: max parallel LLM calls during batch phases (e.g. voting)
# Set to 1 for serial execution (safe default), increase for speed (e.g. 3-5)
max_concurrency: 5

# Global LLM defaults — players inherit these when not specified in game_config.yaml
llm:
  model: "deepseek-chat"
  api_base: "https://api.deepseek.com/v1"
  api_key: ""  # Set via .env: MASQUERADE_LLM__API_KEY
  temperature: 0.7
  max_retries: 3
  timeout: 60
